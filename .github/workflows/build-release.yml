name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  #  LINUX
  # ═══════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Build Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl-dev \
            libgles-dev \
            libegl-dev \
            libglu1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrender-dev \
            cmake \
            build-essential \
            dpkg-dev \
            ninja-build

      - name: Install Qt6 via aqt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: "qtwebengine qtwebchannel qtpositioning"
          cache: true

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}" \
            -G Ninja

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)

      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/nothing-browser_${VERSION}_amd64/DEBIAN
          mkdir -p dist/nothing-browser_${VERSION}_amd64/usr/local/bin
          mkdir -p dist/nothing-browser_${VERSION}_amd64/usr/share/applications
          mkdir -p dist/nothing-browser_${VERSION}_amd64/usr/share/nothing-browser
          cp build/nothing-browser dist/nothing-browser_${VERSION}_amd64/usr/local/bin/
          cp assets/icons/logo.svg dist/nothing-browser_${VERSION}_amd64/usr/share/nothing-browser/
          cat > dist/nothing-browser_${VERSION}_amd64/DEBIAN/control << EOF
          Package: nothing-browser
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: BunElysiaReact <hello@nothingbrowser.dev>
          Depends: libqt6webenginewidgets6 | libqt6webenginecore6
          Description: Nothing Browser - Does nothing... except everything that matters.
          EOF
          cat > dist/nothing-browser_${VERSION}_amd64/usr/share/applications/nothing-browser.desktop << EOF
          [Desktop Entry]
          Name=Nothing Browser
          Exec=/usr/local/bin/nothing-browser
          Icon=/usr/share/nothing-browser/logo.svg
          Type=Application
          Categories=Network;WebBrowser;Development;
          EOF
          dpkg-deb --build --root-owner-group \
            dist/nothing-browser_${VERSION}_amd64 \
            dist/nothing-browser_${VERSION}_amd64.deb

      - name: Build tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf dist/nothing-browser-${VERSION}-linux-x86_64.tar.gz \
            -C build nothing-browser

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.deb
            dist/*.tar.gz
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  #  WINDOWS
  # ═══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: "qtwebengine qtwebchannel qtpositioning"
          cache: true

      - name: Configure (MSVC)
        shell: cmd
        run: |
          mkdir build-win
          cd build-win
          cmake .. ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="%Qt6_DIR%" ^
            -G "Visual Studio 17 2022" ^
            -A x64

      - name: Build
        shell: cmd
        run: |
          cd build-win
          cmake --build . --config Release --parallel

      - name: Package with windeployqt
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          New-Item -ItemType Directory -Force -Path "dist\nothing-browser-win64"
          Copy-Item "build-win\Release\nothing-browser.exe" "dist\nothing-browser-win64\"
          $qtBin = "$env:Qt6_DIR\bin"
          # --webengine flag was removed in Qt6 windeployqt — it deploys WebEngine automatically
          & "$qtBin\windeployqt.exe" `
            --release `
            --no-compiler-runtime `
            "dist\nothing-browser-win64\nothing-browser.exe"
          # Manually copy WebEngine process binaries (windeployqt misses these sometimes)
          $webEngineFiles = @(
            "QtWebEngineProcess.exe",
            "resources",
            "translations\qtwebengine_locales"
          )
          foreach ($f in $webEngineFiles) {
            $src = Join-Path $env:Qt6_DIR $f
            if (Test-Path $src) {
              Copy-Item -Recurse -Force $src "dist\nothing-browser-win64\"
            }
          }
          Compress-Archive `
            -Path "dist\nothing-browser-win64\*" `
            -DestinationPath "dist\nothing-browser-${version}-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist\*.zip
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  #  MACOS
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos:
    name: Build macOS
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: mac
          target: desktop
          arch: clang_64
          modules: "qtwebengine qtwebchannel qtpositioning"
          cache: true

      - name: Configure
        run: |
          mkdir -p build-mac
          cd build-mac
          # MACOSX_BUNDLE=ON makes CMake produce a proper .app bundle
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}" \
            -DMACOSX_BUNDLE=ON \
            -DCMAKE_MACOSX_BUNDLE=ON

      - name: Patch CMakeLists for bundle
        # If main.cpp doesn't set MACOSX_BUNDLE, force it via cmake property
        run: |
          cd build-mac
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}" \
            -DCMAKE_EXE_LINKER_FLAGS="-framework Cocoa"
          # Patch the target to be a bundle
          cat >> CMakeCache.txt << 'EOF'
          nothing-browser_MACOSX_BUNDLE:BOOL=ON
          EOF

      - name: Build
        run: |
          cd build-mac
          make -j$(sysctl -n hw.ncpu)

      - name: Create .app bundle manually if needed
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist

          # Check if .app was produced, if not create it manually
          if [ -d "build-mac/nothing-browser.app" ]; then
            echo "Bundle exists, using it directly"
            APP_PATH="build-mac/nothing-browser.app"
          else
            echo "No .app found — wrapping binary into bundle manually"
            APP_PATH="build-mac/nothing-browser.app"
            mkdir -p "${APP_PATH}/Contents/MacOS"
            mkdir -p "${APP_PATH}/Contents/Resources"
            cp build-mac/nothing-browser "${APP_PATH}/Contents/MacOS/"
            cat > "${APP_PATH}/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>  <string>nothing-browser</string>
            <key>CFBundleIdentifier</key> <string>dev.nothingbrowser.app</string>
            <key>CFBundleName</key>       <string>Nothing Browser</string>
            <key>CFBundleVersion</key>    <string>${VERSION}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF
          fi

          # Run macdeployqt to bundle Qt libs + make .dmg
          ${Qt6_DIR}/bin/macdeployqt "${APP_PATH}" \
            -dmg \
            -always-overwrite
          mv build-mac/nothing-browser.dmg \
            dist/nothing-browser-${VERSION}-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*.dmg
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  #  RELEASE — publish all artifacts
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Publish Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f

      - name: Read changelog from version.json
        id: changelog
        run: |
          NOTES=$(python3 - << 'PYEOF'
          import json
          with open("version.json") as f:
              data = json.load(f)
          lines = []
          for e in data.get("changelog", []):
              t = e["type"]
              tag = "[+]" if t == "added" else "[F]" if t == "fix" else "[→]"
              lines.append(f"{tag} {e['text']}")
          print("\n".join(lines))
          PYEOF
          )
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nothing Browser ${{ github.ref_name }}"
          body: |
            ## Nothing Browser ${{ github.ref_name }}

            > Does nothing... except everything that matters.

            ### What changed
            ${{ steps.changelog.outputs.NOTES }}

            ---

            ### Install

            **Linux — one line:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/BunElysiaReact/nothing-browser/main/install.sh | sudo bash
            ```

            **Debian/Ubuntu .deb:**
            ```bash
            sudo dpkg -i nothing-browser_*_amd64.deb
            ```

            **Windows:** Download `.zip` → extract → run `nothing-browser.exe`

            **macOS:** Download `.dmg` → open → drag to Applications
          files: |
            release-artifacts/linux-build/*.deb
            release-artifacts/linux-build/*.tar.gz
            release-artifacts/windows-build/*.zip
            release-artifacts/macos-build/*.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}