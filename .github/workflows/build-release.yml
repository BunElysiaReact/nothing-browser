name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  #  LINUX
  # ═══════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Qt6 + deps via apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-webengine-dev \
            libqt6webenginewidgets6 \
            libqt6webenginecore6 \
            qt6-webengine-dev-tools \
            libgl-dev \
            libegl-dev \
            libglu1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            cmake \
            ninja-build \
            build-essential \
            dpkg-dev

      - name: Build NewPipe Bridge JAR
        run: |
          cd newpipe-bridge
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon -q
          cd ..

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Copy JAR to build
        run: cp newpipe-bridge/build/libs/newpipe-bridge-1.0.0.jar build/newpipe-bridge.jar

      # ── Full browser .deb ──────────────────────────────────────────────────
      - name: Package nothing-browser .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" == "main" || "$VERSION" == "master" || -z "$VERSION" ]] && VERSION="0.0.0"
          PKG="dist/nothing-browser_${VERSION}_amd64"
          mkdir -p ${PKG}/DEBIAN \
                   ${PKG}/usr/local/bin \
                   ${PKG}/usr/share/applications \
                   ${PKG}/usr/share/nothing-browser

          cp build/nothing-browser         ${PKG}/usr/local/bin/
          cp build/newpipe-bridge.jar      ${PKG}/usr/local/bin/
          cp assets/icons/logo.svg         ${PKG}/usr/share/nothing-browser/

          cat > ${PKG}/DEBIAN/control <<EOF
          Package: nothing-browser
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: BunElysiaReact <hello@nothingbrowser.dev>
          Depends: libqt6webenginewidgets6, libqt6widgets6, libqt6network6, openjdk-17-jre
          Description: Nothing Browser — Does nothing, except everything that matters.
          EOF

          cat > ${PKG}/DEBIAN/postinst <<'EOF'
          #!/bin/sh
          update-desktop-database /usr/share/applications || true
          EOF
          chmod 755 ${PKG}/DEBIAN/postinst

          cat > ${PKG}/usr/share/applications/nothing-browser.desktop <<EOF
          [Desktop Entry]
          Name=Nothing Browser
          Exec=/usr/local/bin/nothing-browser
          Icon=/usr/share/nothing-browser/logo.svg
          Type=Application
          Categories=Network;WebBrowser;Development;
          EOF

          dpkg-deb --build --root-owner-group ${PKG} \
            dist/nothing-browser_${VERSION}_amd64.deb

      # ── Full browser tarball ───────────────────────────────────────────────
      - name: Package nothing-browser tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" == "main" || "$VERSION" == "master" || -z "$VERSION" ]] && VERSION="0.0.0"
          mkdir -p dist/nothing-browser-${VERSION}-linux-x86_64
          cp build/nothing-browser              dist/nothing-browser-${VERSION}-linux-x86_64/
          cp build/newpipe-bridge.jar           dist/nothing-browser-${VERSION}-linux-x86_64/
          tar -czf dist/nothing-browser-${VERSION}-linux-x86_64.tar.gz \
            -C dist nothing-browser-${VERSION}-linux-x86_64

      # ── Headless .deb ──────────────────────────────────────────────────────
      - name: Package nothing-browser-headless .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" == "main" || "$VERSION" == "master" || -z "$VERSION" ]] && VERSION="0.0.0"
          PKG="dist/nothing-browser-headless_${VERSION}_amd64"
          mkdir -p ${PKG}/DEBIAN \
                   ${PKG}/usr/local/bin

          cp build/nothing-browser-headless ${PKG}/usr/local/bin/

          cat > ${PKG}/DEBIAN/control <<EOF
          Package: nothing-browser-headless
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: BunElysiaReact <hello@nothingbrowser.dev>
          Depends: libqt6webenginewidgets6, libqt6widgets6, libqt6network6
          Description: Nothing Browser Headless — Piggy daemon for the nothingbrowser scraping lib.
          EOF

          cat > ${PKG}/DEBIAN/postinst <<'EOF'
          #!/bin/sh
          exit 0
          EOF
          chmod 755 ${PKG}/DEBIAN/postinst

          dpkg-deb --build --root-owner-group ${PKG} \
            dist/nothing-browser-headless_${VERSION}_amd64.deb

      # ── Headless tarball ───────────────────────────────────────────────────
      - name: Package nothing-browser-headless tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" == "main" || "$VERSION" == "master" || -z "$VERSION" ]] && VERSION="0.0.0"
          mkdir -p dist/nothing-browser-headless-${VERSION}-linux-x86_64
          cp build/nothing-browser-headless dist/nothing-browser-headless-${VERSION}-linux-x86_64/
          tar -czf dist/nothing-browser-headless-${VERSION}-linux-x86_64.tar.gz \
            -C dist nothing-browser-headless-${VERSION}-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/nothing-browser_*.deb
            dist/nothing-browser-*-linux-x86_64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: linux-headless-build
          path: |
            dist/nothing-browser-headless_*.deb
            dist/nothing-browser-headless-*-linux-x86_64.tar.gz

  # ═══════════════════════════════════════════════════════════════════════════
  #  WINDOWS
  # ═══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: "qtwebengine qtwebchannel qtpositioning"
          cache: true
          dir: "C:/Qt"

      - name: Build NewPipe Bridge JAR
        shell: cmd
        run: |
          cd newpipe-bridge
          gradlew.bat shadowJar --no-daemon -q
          cd ..

      - name: Find Qt and configure
        shell: powershell
        run: |
          $cmakeDir = Get-ChildItem "C:\Qt" -Recurse -Filter "Qt6Config.cmake" |
                      Select-Object -First 1 -ExpandProperty DirectoryName
          Write-Host "Qt cmake dir: $cmakeDir"
          echo "QT_CMAKE_DIR=$cmakeDir" >> $env:GITHUB_ENV

          $qtRoot = Split-Path (Split-Path (Split-Path $cmakeDir))
          Write-Host "Qt root: $qtRoot"
          echo "QT_ROOT=$qtRoot" >> $env:GITHUB_ENV
          echo "QT_BIN=$qtRoot\bin" >> $env:GITHUB_ENV

      - name: Configure
        shell: cmd
        run: |
          mkdir build-win
          cd build-win
          cmake .. ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="%QT_CMAKE_DIR%" ^
            -G "Visual Studio 17 2022" ^
            -A x64

      - name: Build
        shell: cmd
        run: cmake --build build-win --config Release --parallel

      # ── Full browser package ───────────────────────────────────────────────
      - name: Package nothing-browser
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          if ([string]::IsNullOrEmpty($version) -or $version -eq "main") { $version = "dev" }

          $outDir = "dist\nothing-browser-win64"
          New-Item -ItemType Directory -Force $outDir

          Copy-Item "build-win\Release\nothing-browser.exe" "$outDir\"
          Copy-Item "newpipe-bridge\build\libs\newpipe-bridge-1.0.0.jar" "$outDir\newpipe-bridge.jar"

          $javaHome = "$env:JAVA_HOME"
          Copy-Item -Recurse "$javaHome" "$outDir\jre"

          $wdqt = Get-ChildItem "C:\Qt" -Recurse -Filter "windeployqt.exe" |
                  Select-Object -First 1 -ExpandProperty FullName
          Write-Host "windeployqt: $wdqt"
          & $wdqt --release --no-compiler-runtime "$outDir\nothing-browser.exe"

          @("QtWebEngineProcess.exe","resources","translations\qtwebengine_locales") | ForEach-Object {
            $src = Join-Path $env:QT_ROOT $_
            if (Test-Path $src) { Copy-Item -Recurse -Force $src "$outDir\" }
          }

          Compress-Archive `
            -Path "$outDir\*" `
            -DestinationPath "dist\nothing-browser-${version}-windows-x64.zip"

      # ── Headless package ───────────────────────────────────────────────────
      - name: Package nothing-browser-headless
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          if ([string]::IsNullOrEmpty($version) -or $version -eq "main") { $version = "dev" }

          $outDir = "dist\nothing-browser-headless-win64"
          New-Item -ItemType Directory -Force $outDir

          Copy-Item "build-win\Release\nothing-browser-headless.exe" "$outDir\"

          $wdqt = Get-ChildItem "C:\Qt" -Recurse -Filter "windeployqt.exe" |
                  Select-Object -First 1 -ExpandProperty FullName
          & $wdqt --release --no-compiler-runtime "$outDir\nothing-browser-headless.exe"

          @("QtWebEngineProcess.exe","resources","translations\qtwebengine_locales") | ForEach-Object {
            $src = Join-Path $env:QT_ROOT $_
            if (Test-Path $src) { Copy-Item -Recurse -Force $src "$outDir\" }
          }

          Compress-Archive `
            -Path "$outDir\*" `
            -DestinationPath "dist\nothing-browser-headless-${version}-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist\nothing-browser-*-windows-x64.zip
          exclude: dist\nothing-browser-headless-*

      - uses: actions/upload-artifact@v4
        with:
          name: windows-headless-build
          path: dist\nothing-browser-headless-*-windows-x64.zip

  # ═══════════════════════════════════════════════════════════════════════════
  #  MACOS
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos:
    name: Build macOS
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: mac
          target: desktop
          arch: clang_64
          modules: "qtwebengine qtwebchannel qtpositioning"
          cache: true
          dir: "${{ github.workspace }}/Qt"

      - name: Find Qt root
        run: |
          QT_ROOT=$(find ${{ github.workspace }}/Qt -name "macdeployqt" -type f | head -1 | xargs dirname | xargs dirname)
          echo "QT_ROOT=$QT_ROOT" >> $GITHUB_ENV
          echo "QT_BIN=$QT_ROOT/bin" >> $GITHUB_ENV
          echo "Qt root: $QT_ROOT"

      - name: Build NewPipe Bridge JAR
        run: |
          cd newpipe-bridge
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon -q
          cd ..

      - name: Configure
        run: |
          mkdir -p build-mac
          cmake -B build-mac \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT" \
            

      - name: Build
        run: cmake --build build-mac --parallel

      # ── Full browser .dmg ──────────────────────────────────────────────────
      - name: Package nothing-browser .dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev"
          mkdir -p dist

          if [ -d "build-mac/nothing-browser.app" ]; then
            APP="build-mac/nothing-browser.app"
          else
            APP="build-mac/nothing-browser.app"
            mkdir -p "${APP}/Contents/MacOS"
            cp build-mac/nothing-browser "${APP}/Contents/MacOS/"
            cat > "${APP}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>nothing-browser</string>
            <key>CFBundleIdentifier</key><string>dev.nothingbrowser.app</string>
            <key>CFBundleName</key><string>Nothing Browser</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          fi

          cp newpipe-bridge/build/libs/newpipe-bridge-1.0.0.jar \
            "${APP}/Contents/MacOS/newpipe-bridge.jar"
          cp -r "$JAVA_HOME" "${APP}/Contents/Runtime"

          "$QT_BIN/macdeployqt" "$APP" -dmg -always-overwrite
          mv build-mac/nothing-browser.dmg \
            dist/nothing-browser-${VERSION}-macos.dmg

      # ── Headless tarball ───────────────────────────────────────────────────
      - name: Package nothing-browser-headless
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev"
          mkdir -p dist/nothing-browser-headless-${VERSION}-macos
          cp build-mac/nothing-browser-headless \
            dist/nothing-browser-headless-${VERSION}-macos/
          tar -czf dist/nothing-browser-headless-${VERSION}-macos.tar.gz \
            -C dist nothing-browser-headless-${VERSION}-macos

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/nothing-browser-*-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-headless-build
          path: dist/nothing-browser-headless-*-macos.tar.gz

  # ═══════════════════════════════════════════════════════════════════════════
  #  RELEASE
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Publish Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Build changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -30)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -30)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          name: "Nothing Browser ${{ github.ref_name }}"
          body: |
            ## Nothing Browser ${{ github.ref_name }}
            > Does nothing... except everything that matters.

            ### What's changed
            ${{ steps.changelog.outputs.NOTES }}

            ---

            ### Install — Nothing Browser (full UI)

            **Linux (deb)**
            ```bash
            sudo dpkg -i nothing-browser_*_amd64.deb
            ```

            **Linux (tar.gz)**
            ```bash
            tar -xzf nothing-browser-*-linux-x86_64.tar.gz
            cd nothing-browser-*-linux-x86_64
            ./nothing-browser
            ```

            **Windows:** Download `.zip` → extract → run `nothing-browser.exe` (JRE bundled)

            **macOS:** Download `.dmg` → drag to Applications (JRE bundled)

            ---

            ### Install — Nothing Browser Headless (Piggy daemon)

            Used by the `nothingbrowser` scraping lib. No UI.

            **Linux (deb)**
            ```bash
            sudo dpkg -i nothing-browser-headless_*_amd64.deb
            ```

            **Linux (tar.gz)**
            ```bash
            tar -xzf nothing-browser-headless-*-linux-x86_64.tar.gz
            ./nothing-browser-headless
            ```

            **Windows:** Download headless `.zip` → extract → run `nothing-browser-headless.exe`

            **macOS:** Download headless `.tar.gz` → extract → run `nothing-browser-headless`

          files: |
            release-artifacts/linux-build/*.deb
            release-artifacts/linux-build/*.tar.gz
            release-artifacts/linux-headless-build/*.deb
            release-artifacts/linux-headless-build/*.tar.gz
            release-artifacts/windows-build/*.zip
            release-artifacts/windows-headless-build/*.zip
            release-artifacts/macos-build/*.dmg
            release-artifacts/macos-headless-build/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}